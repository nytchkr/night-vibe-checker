# Supabase local dev config
# Switch between projects with: supabase link --project-ref <ref>
#
# Production project ref: gfsbqewkrcyclbktfyfk  (account: your main account)
# Dev project ref:        onlpwglwnqoivuykywrk  (account: dev@dashurl.site)

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://nytchkr.com"
additional_redirect_urls = ["https://nytchkr.com", "https://nytchkr.com/**", "http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
redirect_uri = ""

[analytics]
enabled = false
